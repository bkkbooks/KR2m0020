body:
  text: 漢官舊儀卷下漢衛宏撰中宫及號位皇后稱中宫媫妤見大長秋稱皇后為媫妤下輿坐稱起禮比丞相娙娥見女御長稱謝按漢書戾太子傳長御倚華如淳注引漢儀注云女長御比侍中皇后見娙娥以下長御稱謝與此文相合惟御長作長御稍異又鄭氏云長音如長者禮比将軍御史大夫昭儀見稱謝比中二千石貴人見稱皇后詔曰可禮比二千石美人無數媫妤以下皆居掖庭置令丞廬監宦者女御長如侍中皇后一人媫妤以至貴人皆至十數美人比待詔無數元帝成帝皆且千人侍中左右近臣見皇后如見按北堂書鈔引此文見下有帝字媫妤行則對璧坐則伏茵皇后媫妤乗輦餘皆以茵四人輿以行皇后玉璽文與帝同皇后之璽金螭虎紐本注曰一本無此條皇后春桑皆衣青手采桑以繅三瓮蠒按藝文類聚引此文作三盆瓮字誤羣臣妾從春桑生而皇后親桑於苑中蠶室養蠶千薄以上祠以中牢羊豕祭蠶神曰苑窳婦人寓氏公主凡二神羣臣妾從桑還獻于蠒觀皆賜從採桑者樂皇后自行凡蠶絲絮織室以作祭服祭服者冕服也天地宗廟羣神五時之服按後漢書東平王蒼𫝊五時衣各一襲李賢注謂春青夏朱季夏黄秋白冬黒晉書職官志有五時朝服盖朝祭皆以為法服也藝文類聚引此文羣神作羣臣誤皇帝得以作縷縫衣皇后得以作巾絮而已置蠶官令丞諸天下官下法皆詣蠶室與婦人從事故舊有東西織室作治皇后五日一上食食賜上左右酒肉留宿明日平旦歸中宫皇帝聘皇后黄金萬斤按漢書王莽傳故事聘皇后黄金二萬斤為錢二萬萬與此文異疑萬上脱二字立皇后太子大赦天下賜天下男子爵女子牛酒繒帛夫増秋掖庭令晝漏未盡八刻廬監以茵次上媫妤以下至後庭訪白錄所錄所推當御見刻盡去簮珥䝉被入禁中五刻罷即留女御長入扶以出御幸賜銀鐶令書得鐶數計月日無子罷廢不得復御宫人擇官婢年八嵗以上侍皇后以下年三十五出嫁乳母取官婢皇太子稱家動作稱從皇太子黄金印龜紐印文曰章下至二百石皆為通官印太傅一人真二千石禮如師亡新更為太子師中庶子五人職如侍中秩六百石中尚翼中涓如中黄門皆宦者門大夫比郎将洗馬職如謁者十六人選郎中補也庻子舍人按續漢書百官志太子庶子太子舍人為兩官此書庶子已别見後條此條庶子二字疑當作太子四百人按四百人三字疑衍如郎中秩比二百石無員多至四百人亡新改名為翼子率更令秋千石主庶子舍人更直亡新改為中更丞一人秩四百石家令秩千石主倉獄亡新改為中更家府比二千石僕秩千石主馬庶子秩比四百石如中郎無員亡新改為中翼子衛率秩比千石丞一人主門衛食官令秩六百石丞一人中盾秩四百石主周衛徼循庻子舍人五日一移主率更長三不㑹輙斥官奴擇給書計從侍中以下為倉頭青幘與百官從事從入殿中省中待使令者皆官婢擇年八嵗以上衣縁按緣字疑綠字之訛曰宦人不得出省門置都監老者曰婢婢教宦人給使尚書侍中皆使官婢不得使宦人奴婢欲自贖錢千萬免為庻人宫殿中宦者署郎署皆官奴婢傳言曰作者歌傳以呼召侍中以下署長本注曰宦者及郎署長各顧門户擇官奴赤幘部領作者掃除曰正本注曰歌傳取於雒陽古周時傳呼聲法按此注當在歌傳以呼召句下天子六廏未央廏承華廏騊駼廏路軨廏騎馬廏大廏馬皆萬疋中黄門駙馬大宛汗血馬乾河馬天馬果下馬本注曰果下馬髙三尺駕輦大宛汗血馬皆髙七尺乾河馬華山神馬種也長安城方六十里按後漢書郡國志京兆尹條下注云長安城方六十三里漢志似誤經緯各十五里十二城門積九百七十三頃百二十亭長安城方六十里中皆屬長安令置左右尉城東城南置廣部尉城西城北置明部尉凡四尉皇后太子各食四十縣曰湯沐邑按藝文類聚引此文作三十縣帝子為王王國置太傅相中尉各一人秩二千石以輔王僕一人秩千石郎中令秩六百石置官如漢官官吏郎大夫四百石以下自調除國中漢置内史一人秩二千石治國如郡太守都尉職事調除吏屬相中尉傅不得與國政輔王而已當有為移書告内史内史見傅相中尉禮如都尉太守按太守當作太傅相置長史中尉及内史令置丞一人皆六百石成帝時大司空何武奏罷内史相如太守中尉如都尉參職是後相中尉爭權與王逓相奏常不和王子為侯侯王嵗以户口酎黄金獻于漢廟皇帝臨受獻金以助祭大祠曰飲酎飲酎受金小不如斤兩色惡王奪户侯免國漢承秦郡置太守治民㫁獄都尉治獄都尉治盗賊甲卒兵馬民年二十三為正一嵗而以為衛士一歲為材官騎士習射御騎馳戰陣八月太守都尉令長相丞尉㑹都試課殿最水處為樓船亦習戰射行船邊郡太守各将萬騎行障塞烽火追虜置長史一人掌兵馬丞一人治民當兵行長史領置部都尉千人司馬候農都尉皆不治民不給衛士材官樓船年五十六老衰乃得免為民就田里民應令選為亭長亭長課射游徼徼循尉游徼亭長皆習設備五兵五兵弓弩戟盾刀劍甲鎧鼔武字衍吏赤幘大冠行縢帶劍佩刀持盾被甲設矛戟習射按此文原本自甲鎧鼔以上為一條而武吏赤幘大冠以下别為一條今考北堂書鈔引此文云亭長習設五兵五兵言弩戟刀劍鎧也其於五兵不數盾者盖傳冩脱漏而並不及鼔則鼔字自當屬下文讀續漢書志注引此亦作鼔吏赤幘云云無武字原本既分為兩條又衍一武字俱誤設十里一亭亭長亭候五里一郵郵間相去二里半司姦盜亭長持三尺板以劾賊索䋲以收執盜舊制尉皆居官署有尉曹官中領平鏁署按此句疑有脱誤更令吏曰令史丞吏曰丞史尉吏曰尉史捕盜賊得捕格縣户口滿萬置六百石令多者千石户口不滿萬置四百石三百石長大縣兩尉小縣一尉丞一人三百石丞縣長黄綬皆大冠亡新令長為宰皆小冠號曰夫子亡新時有五百石八百石府下置詔獄本注曰府河南府也鄧展曰舊洛陽有兩獄建始二年按元帝紀建昭二年三月益三河大郡太守秩成帝建始二年並無益秩之文建始當作建昭益三河及大郡太守秩本注曰十二萬户以上為大郡太守小郡守遷補大郡元朔三年以上郡西河為萬騎太守月奉二萬綏和元年省大郡萬騎員秩以二千石居舊制令六百石以上按令字疑當作吏尚書調拜遷四百石長相至二百石丞相調除中都官百石按漢書師古注中都官京師諸官府大鴻臚調郡國百石二千石調哀帝時長相皆黒綬亡新吏黒綬有罪先請與㢘吏同按宣帝紀黄龍元年詔曰舉㢘吏誠欲得其真也吏六百石位大夫有罪先請秩祿上通足以效其賢才自今以來毋得舉据此則有罪先請為吏六百石以上不得復舉孝㢘者此文乃曰與廉吏同未詳其義疑上下文有脱誤内郡為縣三邊為道皇后太子宫主所食為邑算民年七嵗以至十四嵗出口錢人二十三以食天子按句首脱二十錢三字其三錢者武帝加口錢以補車騎馬逋税又令民男女年十五以上至五十六賦錢人百二十為一笇以給車馬民田積蒭槀以給經用備凶年山澤魚鹽市税以給私用按武帝紀太初二年籍吏民馬補車騎馬盖自元狩四年以來縣官錢少買馬難得於是有馬者籍之且于口賦之外増三錢以補車騎馬之用所謂馬口錢者此也其後昭帝省乗輿馬及苑馬元鳯二年詔郡國無斂馬口錢前後漢書並無以口錢補逋税之文逋税乃逐年收責不籍口賦錢補也此條所云以補車騎馬逋税當是明時校錄者緣光武紀建武二十二年口賦逋税勿收責一條注中引漢儀注牽連逋税二字而誤漢舊制天下郡國凡百六邑侯國凡千八百上林苑中昆明池鎬池牟首諸池取魚鼈給祠祀用魚鼈千枚以上餘給太官上林苑中以養百獸禽鹿嘗祭祠祀賔客用鹿千枚麕無數佽飛具繒繳以射鳧鴈應給祭祀置酒毎射收得萬頭以上給太官上林苑中天子秋冬射獵取禽獸無數實其中離宫觀十七所皆容千乗萬騎武帝時使上林苑中官奴婢及天下貧民貲不滿五千徙置苑中養鹿因收撫鹿矢人日五錢到元帝時七十億萬以給軍擊西域古者諸侯治民周以上千八百諸侯其長伯為君次仲叔季為卿大夫支屬為士庶子皆世官位至秦始皇帝滅諸侯為郡縣不世官守相令長以他姓相代去世卿大夫士漢承秦爵二十等以賜天下爵者祿位也公士一爵賜爵一級為公士謂為國君列士也上造二爵賜爵二級為上造上造乗兵車也簮褭三爵賜爵三級為簮褭不更四爵賜爵四級為不更不更主一車四馬大夫五爵賜爵五級為大夫大夫主一車屬三十六人官大夫六爵賜爵六級為官大夫官大夫領車馬公大夫七爵賜爵七級為公大夫公大夫領行伍兵公乗八爵賜爵八級為公乗與國君同車五大夫九爵賜爵九級為五大夫以上次年徳為官長将率秦制爵等生以為禄位死以為號諡按百官志注引荀綽晉百官表注曰自公士至五大夫皆軍吏也自左庶長至大庶長皆卿大夫皆軍将也此條所云官長将率祿位諡號非顓指軍吏之辭似當在二十爵一條下為總結之文或者錯簡在此耳左庶長十爵右庶長十一爵左更十二爵中更十三爵右更十四爵少上造十五爵太上造十六爵駟車庶長十七爵大庶長十八爵侯十九爵按侯當作闗内侯前漢書十九闗内侯師古曰言有侯號而居京畿無國邑列侯二十爵秦制二十爵男子賜爵一級以上有罪以減年五十六免無爵為士伍年六十乃免老有罪各盡其刑几有罪男髠鉗為城旦城旦者治城也女為舂舂者治米也皆作五嵗完四嵗鬼薪三嵗鬼薪者男當為祠祀鬼神伐山之薪蒸也女為白粲者以為祠祀擇米也皆作三嵗罪為司㓂司宼男備守女為作如司宼皆作二嵗按為司寇數句疑有脱誤考前漢書刑法志𨽻臣妾滿二嵗為司寇司寇一嵗及作如司寇二嵗皆免為庶人與此互異男為戍罰作女為復作皆一嵗到三月按此下疑有脱誤或當别為一條令曰秦時爵大夫以上令與亢禮五人為伍伍長一人十人為什什長一人百人為卒卒史一人五百人為旅旅帥一人二千五百人為師師帥一人萬二千五百人為軍軍将一人以上卿為将軍九夫為井四井為邑四邑為丘四丘為乗乗則具車一乗四馬步卒三十六人千乗之國馬四千匹步卒三萬六千人為三軍大國也次國二軍小國一軍漢官舊儀卷下
