  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0020_WYG_001-1a, image: WYG0646/WYG0646-0002c.png}
body:
  text: 漢官舊儀卷上漢衛宏撰皇帝起居儀宫司馬內按元帝紀初元五年宫司馬中注應劭曰宫司馬中者宫內門也據此則此內字與中字義同百官案籍出入營衛周廬晝夜誰何殿外門署屬衛尉殿內郎署屬光祿勳黃門鈎盾署屬少府輦動則左右侍帷幄者稱警車駕則衛官填街騎士塞路出殿則傳蹕止人清道建五旗丞相九卿執兵奉引乘輿冠髙山冠飛羽之纓按晋書輿服志引此文作漢官儀又飛羽作飛翮幘耳赤丹紈裏按續漢書輿服志劉昭補注引此文裏下有衣字帶七尺斬蛇劍履虎尾絇履諸王歸國稱從皇帝六璽皆白玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽凡封按此句有脫字應云凡封命用之之璽按此句應云皇帝之璽賜諸侯王書信璽按此句應云皇帝信璽發兵其徴大臣以天子行璽䇿拜外國事以天子之璽事天地鬼神以天子信璽按此條皇帝行璽下各句並有脫字續漢書輿服志注所引亦同惟隋書禮儀志稱皇帝行璽封命諸侯及三公用之皇帝之璽與諸侯及三公書用之皇帝信璽發諸夏兵用之文義完備謹參校以正其缺又漢書霍光傳皇帝信璽行璽孟康注天子之璽自佩行璽信璽在符節臺亦可考見漢時藏璽之制併附著之以補此文所未備皆以武都紫泥封青布囊按續漢書輿服志注引此文無布字白素裏兩端無縫尺一板中約署按此句疑有脫字皇帝帶綬黃地六采按六采舊作赤采似誤又考宋書禮志引漢制皇帝黃赤綬四采黃赤縹紺亦與此互異今據續漢書輿服志注校正不佩璽按續漢書志注引此文璽下重一璽字以金銀縢組侍中組負以從秦以前民皆佩綬以金玉銀銅犀象為方寸璽各服所好奉璽書使者乘馳傳其驛騎也三騎行晝夜行千里為程太官尚食用黃金扣器中官私官尚食用白銀扣器中官小兒官及門户四尚中黃門持兵三百人侍宿按漢書百官公卿表百官志皆不載小兒官及門户四尚官名冗從吏僕射按續漢書百官志中黃門冗從僕射一人六百石此句首疑脫中黃門三字吏字疑亦衍文出則騎從夾乘輿車居則宿衛直守省中門户本注曰省中禁中也成帝外家王禁貴重朝中為諱禁故曰省中常侍宦者秩千石得出入卧內禁中諸宫侍中無員或列侯將軍衛尉光祿將大夫郎為之得舉非法白請及出省户休沐往來過直事御史員四十五人皆六百石其十五人衣絳給事殿中為侍御史宿廬左右渠門外二人尚璽四人持書給事二人按漢書百官公卿表僕射御史治書尚符璽者有印綬續漢書百官志治書侍御史二人此文持字疑當作治侍中丞一人領按漢書表志漢改御史大夫為司空别留中丞為御史臺率而侍中乃列侯以下入侍禁中者所加官名並無侍中丞之官侍字疑衍文餘三十人留寺按寺御史署也在司馬門內前漢書蕭望之傳注作三十人留守者非理百官也給事中無常員位次侍中常侍尚書四人為四曹侍曹尚書按前漢書師古注引此文侍上有常字與續漢書志合主丞相御史事二千石曹尚書主刺史二千石事民曹尚書主庶民上書事客曹尚書主外國四夷事成帝初置尚書員五人有三公曹主斷獄尚書令主贊奏封下書按續漢書百官志掌凡選署及奏下尚書文書衆事僕射主閉封丞二人主報上書者兼領財用火燭食厨漢置中官領尚書事中書謁者令一人成帝建始四年罷中書官以中書為中謁者令尚書郎四人胸奴單于營部二郎主羌夷吏民民曹一郎主天下户口墾田功作謁者曹一郎主天下見錢貢獻委輸按晉書職官志漢置尚書郎四人一人主胸奴單于營部一人主羌夷吏民一人主户口墾田一人主財帛委輸與此文少異疑二郎當作一郎胸奴單于上脫一郎主三字中臣在省中皆白請其宦者不白請尚書郎宿留臺中官給青縑白綾被或錦被帷帳氊褥通中枕太官供食湯官供䴵餌果實下天子一等給尚書郎伯二人女侍史二人皆選端正者從直伯送至止車門還女侍史執香爐燒薰從入臺護衣黃門令領黃門謁者騎吹曰冗從僕射一人領髦頭左曹日上朝謁秩二千石右曹日上朝謁秩二千石黃門郎屬黃門令日暮入對青鎖門拜名曰夕郎五官中郎將秩比二千石主五官郎中左右中郎將秩比二千石主謁者常侍侍郎以資進本注曰左主謁者右主常侍侍郎五官屬光祿勳不得上朝謁兼左右曹諸吏得上朝謁郎中令主郎中按漢書注主郎內諸官左車將主左車郎右車將主右車郎左户將主左户郎右户將主右户郎按漢書如淳注引漢儀注與此文同秩皆比千石獨郎中令比二千石按郎中令武帝太初元年更名光祿勳此文前後皆言光祿勳獨此條言郎中令杜預所謂史駁文也又續漢書百官志光祿勳卿一人中二千石此云比二千石疑有誤或漢初未更官名時舊制耳黃門冗從持兵無數宣通內外宦者署尚書皆屬少府殿中諸署五郎將屬光祿勳按上文五官左右三中郎將此言五郎將者蓋并虎賁羽林二中郎將為五也宫司馬諸隊都候領督盜賊屬執金吾司馬掖門殿門屯衛士皆屬衛尉按宋錢文子曰百官表中尉屬官無衛司馬候左右都候此云屬金吾者蓋執金吾徼巡宫外實相表裏所謂聨事也中尉武帝太初元年更名執金吾右中二千石二千石四官按少府光祿勳執金吾衛尉四官續漢志皆中二千石此云中二千石二千石者蓋西漢時初制奉宿衛各領其屬斷其獄期門騎者隴西工射獵人及能用五兵材力三百人行出㑹期門下從射獵無員秩比郎從官名曰期門騎置僕射一人秩六百石騎持五旗别外內王莽更名虎賁郎按百官公卿表平帝元始元年更名虎賁郎遷補吏署中郎將一人施旄頭按中郎將一人謂羽林中郎將也考漢百官公卿表宣帝令中郎將騎都尉監羽林霍光傳有諸吏中郎將羽林監任勝蓋以中郎將或騎都尉監羽林騎故於本官上不冠以羽林之號至後漢始置羽林中郎將為定職耳又東方朔傳羿為旄頭注引應劭曰旄頭今以羽林為之髮正向上而長衣繡衣在乘輿車前据此則施旄頭之文當為羽林所職無疑也屬羽林取三輔良家子自給按宋錢文子補漢兵志引此文羽林下有從官七百人五字自給下有鞍馬二字蓋舊本脫此七字又漢書如淳注引漢儀注亦云羽林從官七百人孤兒無數按錢文子補漢兵志引此文句首有諸字父死子代皆武帝時從軍死子孤不能自活養羽林官比郎從官從車駕不得冠置令一人名曰羽林騎孤兒皇帝見諸侯王列侯起侍中稱曰皇帝為諸侯王列侯起起立乃坐太常贊曰謹謝行禮皇帝在道丞相迎謁謁者贊曰皇帝為丞相下輿立乃升車皇帝見丞相起謁者贊稱曰皇帝為丞相起立乃坐太常贊稱敬謝行禮宴見侍中常侍贊御史大夫見皇帝稱謹謝將軍見皇帝稱謝中二千石見皇帝稱謝二千石見皇帝稱制曰可太守見皇帝稱謝拜御史大夫為丞相左右前後將軍贊五官中郎將授印綬拜左右前後將軍為御史大夫中二千石贊左右中郎將授印綬拜中二千石中郎將贊御史中丞授印綬拜千石六百石御史中丞贊侍御史授印綬印綬盛以篋篋緑綈表白素裏尚書令史捧西向侍御史東向取篋中印綬授者却退受印綬者手握持出至尚書下乃席之丞相列侯將軍金印紫緺綬中二千石二千石銀印青緺綬皆龜紐其斷獄者印為章漢初置相國史秩五百石後罷并為丞相史丞相府司直一人秩一千石職無不監武帝初置曰馬直官今省按馬直官當作司直官百官志本注曰世祖以武帝故事置司直居丞相府助督録諸州建武十八年省列侯為丞相相國號君侯御史大夫為丞相更奏乃封丞相車黑兩轓騎者衣絳掾史見禮如師弟子白録不拜朝示不臣也聽事閣曰黃閣無鐘鈴掾有事當見者主簿至曹請不傳召掾見脫履公立席後答拜百石屬不得白事當謝者西曹掾為通謝部吏二千石初除詣東曹掾拜部謁者贊之丞相門無孰門署用梗板方圓三尺不堊色不郭邑署曰丞相府東門西門長史物故廷尉正監守丞相初置吏員十五人皆六百石分為東西曹東曹九人出督州為刺史西曹六人其五人往來白事東廂為侍中一人留府曰西曹領百官奏事長安給騎亭長七十人六月一更倉頭廬兒出入大車駟馬前後大車駢車中二千石屬官以次送從丞相太尉大將軍史秩四百石按漢書如淳注引漢儀注與此文同丞相刺史常以秋分行部御史為駕四封乘傳按漢書平帝紀如淳注律當乘傳及發駕置傳者皆持尺五寸木傳信封以御史大夫卬章其乘傳參封之參三也有期㑹纍封兩端端各兩封凡四封也乘置馳傳五封也兩端各二中央一也軺傳兩馬再封之一馬一封也据此則前文所云奉璽書使者乘馳傳當駕五封矣到所部郡國各遣吏一人迎界上得載别駕自言受命移郡國與刺史從事盡界罷行載從者一人得從吏所察六條刺史舉民有茂材移名丞相丞相考召取明經一科明律令一科能治劇一科各一人詔選諫大夫議郎博士諸侯王傅僕射郎中令取明經選廷尉正監平案章取明律令選能治劇長安三輔令取治劇皆試守小冠滿嵗為真以次遷奉引則大冠武帝元狩六年初置大司馬丞相司置諌大夫秩六百石丞相小史秩四百石次三百石百石書令史斗食缺試中二千書佐髙第補因為騎史武帝元狩六年丞相吏員三百八十二人史二十人秩四百石少史八十人秩三百石屬百人秩二百石屬史百六十二人秩百石皆從同秩補以為有權衡之量不可欺以輕重有丈尺之度不可欺以長短官事至重古法雖聖猶試故令丞相設四科之辟以博選異德名士稱才量能不宜者還故官第一科曰德行髙妙志節清白二科曰學通行修經中博士三科曰明曉法令足以決疑能案章覆問文中御史四科曰剛毅多略遭事不惑明足以照姦勇足以決斷才任三輔令按藝文類聚引此文輔下有劇字皆試以能信然後官之第一科補西曹南閣祭酒二科補議曹三科補四辭八奏四科補賊決其以詔使案事御史為駕一封行赦令駕二封皆特自奏事各以所職劾中二千石以下選中二千書佐試補令史令史皆斗食遷補御史令史其欲以秩留者許之嵗舉秀才一人亷吏六人丞相典天下誅討賜奪吏勞職煩故吏衆君侯月一行屯衛騎不以車衛士初至未入君侯到都門外勞賜吏士武帝元封五年初分十三州刺史假印綬有常治所按漢志書太守都尉之治而刺史無有故沈約劉昭皆以為傳車周流無常治所但刺史行部必待秋分則秋分以前當居何所耶漢書朱博傳博遷冀州刺史敕告吏民欲言二千石墨綬長吏者使者行部還詣治所師古曰治所刺史所止理事處是刺史本有治所漢志特略而不載耳舊儀所云可取證也奏事各有常㑹擇所部二千石卒史與從傳食比二千石所傳刺史奏幽隱奇士拜為三輔縣令比四百石居後六卿一切舉試守令取徴事本注曰徴事比六百石皆故吏二千石不以贓罪免降秩為徴事郡國守丞長史上計事竟遣君侯出坐庭上親問百姓所疾苦計室掾吏一人大音者讀敕畢遣敕曰詔書數下禁吏無苛暴丞長史歸告二千石凡民所疾苦急去殘賊審擇良吏無任苛刻治獄決訟務得其中明詔憂百姓困於衣食二千石帥勸農桑思稱厚恩有以賑贍之無煩擾奪民時公卿以下務飭儉恪今俗奢奓過制度日以益甚二千石務以身帥有以化之民冗食者謹以法養視疾病致醫藥務活之詔書無飾厨傳增養食至今未變或更尤過度甚不稱歸告二千石務省約如法且案不改者長吏以聞守寺鄉亭漏敗垣墻阤壞所治無辦護者不稱任先自劾不應法歸告二千石勿聽惟神爵三年十月甲子丞相受詔之官按百官公卿表神爵三年四月戊戌御史大夫內吉為丞相與此文月日不合皇帝延登親詔之曰君其進虛受朕言朕鬱于大道獲保宗廟兢兢師師夙夜思過失不遑康寧晝思百官未能綏於戲丞相其帥意無怠以補朕闕於戲羣卿大夫百官慎哉不勗于職厥有常刑往悉乃心和裕開賢俾之反本乂民廣風一俗靡諱朕躬天下之衆受制於朕丞相可不慎歟於戲君其誡之丞相府官奴婢傳漏以起居不擊鼓官屬吏不朝旦白録而已諸吏初除謁視事問君侯應閣奴名白事以方尺板叩閣大呼奴名君侯出入諸吏不得見見禮如師弟子狀掾史有過君侯取録推其録三日白病去御史衛尉寺在宫中亦不鼓詔書下朱鈎施行詔書下有違法令施行之不便曹史白封還尚書對不便狀丞相有病皇帝法駕親至問病從西門入即薨移居第中車駕往弔賜棺斂具贈錢葬地葬日公卿以下㑹送有天地大變天下大過皇帝使侍中持節乘四白馬賜上尊十斛按藝文類聚引此文尊下有酒字養牛一頭䇿告殃咎使者去半道丞相上病使者還未白事尚書以丞相不起病聞丞相不勝任使者奉策書駕騩駱馬即時布衣步出府免為庶人丞相有他過使者奉䇿書駕騅騩馬即時步出府乘棧車牝馬歸田里思過日食即日下赦曰制詔御史其赦天下自殊死以下及吏不奉法乘公就私凌暴百姓行權相放治不平正處官不良細民不通下失其職俗不孝弟不務于本衣服無度出入無時衆彊勝寡盜賊滋彰丞相以聞於是乃命刺史出刺并察監御史元封元年御史止不復監後御史職與丞相參增吏員凡三百四十一人分為吏少史屬亦從同秩補率取文法吏廷尉正監平物故以御史髙第補之御史少史行事如御史少史有所為即少史屬得守御史行事如少史少史秩比六百石御史少史物故以功次徴丞相史守御史少史所代到官視事得留罷中二千石詹事水衡都尉丞相史物故調御史少史守丞相史若御史少史監祠寢園廟調御史少史屬守不足丞相少史屬為倅事已罷丞相刺史侍御史皆稱卿不得言君御史中丞督司隸司隸督司直司直督二千石以下至黑綬按北堂書鈔引漢舊儀作司隸督丞相丞相督司直司直督刺史刺史督二千石云云與此文略異又御史中丞上有武帝時三字大夫見孝廉上計丞長史皆放官司馬門外比丞相掾史白録御史大夫寺在司馬門內門無孰門署用梓板不起郭邑題曰御史大夫寺大夫初拜䇿曰惟五鳯三年正月乙巳御史大夫之官按百官公卿表五鳯三年六月辛酉西河太寺杜延年為御史大夫與此文月日不合皇帝延登親詔之曰御史大夫其進虛受朕言朕鬱于大道獲保宗廟兢兢師師夙夜思已失不遑康寧晝思百姓未能綏於戲御史大夫其帥意盡心以補朕闕於戲九卿羣大夫百官慎哉不朂於厥職厥有常辟往悉乃心和裕開賢俾賢能反本乂民靡諱朕躬天下之衆受制于朕以法為命可不慎歟於戲御史大夫其誡之敇上計丞長史曰詔書數下布告郡國臣下承宣無狀多不究百姓不蒙恩被化守丞長史到郡與二千石力為民興利除害務有以安之稱詔書有郡國茂材不顯者言上殘民貪汚煩擾之吏百姓所苦務勿任用方察不稱者也漢官舊儀卷上
