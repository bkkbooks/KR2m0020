body:
  text: 漢官舊儀政書類二儀制之屬提要臣等謹案漢議郎東海衛宏敬仲作漢舊儀四篇以載西京雜事見於范書本傳隋唐經籍藝文志漢舊儀四卷宋史藝文志三卷俱著於録馬端臨經籍考卷目與宋志同而别題作漢官舊儀陳振孫書録解題遂以其有漢官之目疑非衛宏本書或又以為胡廣所作後亦佚不復傳世所見者獨前後漢書注及唐宋諸書所引而已今永樂大典所載此本亦題漢官舊儀不著撰人名氏其間述西京舊事典章儀式甚備且與諸書所引漢舊儀之文參校無弗同者自屬衛宏本書其稱漢官舊儀者或後人因其所載官制為多妄加之耳至漢書注中頗有稱胡廣曰者與漢舊儀互引其文亦絶不相合惟廣傳載廣著詩賦銘頌及解詁二十二篇而史注所引别有漢官解詁之名葢即廣所作而舊儀之當出衛宏手益無疑也此本舊時失於讐正首尾序次錯糅文字至脱誤不可乙今據史文覈勘且旁徴舊書參析同異疏於各句下方其原有注者略仿劉昭注續漢志例通為大書稱本注以别之釐為上下二卷又前後漢紀志注及唐宋類書内所引佚文頗多葢此書遞更顯晦已非完本謹為蒐擇甄録别為補遺一卷附於其後以畧還宋志篇目之舊云乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2099c3b7abe6e0130d1abe8a10a48e243ac1cc8aa9337ca5137ed94fddd9024f
