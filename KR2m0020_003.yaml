body:
  text: 漢官舊儀補遺上林詔獄主治苑中禽獸宫館事屬水衡成帝紀建始元年注諸侯王黃金璽槖駝鈕文曰璽師古曰謂刻云某王之璽百官公卿表注銀印背龜鈕其文曰章師古曰謂刻曰某官之章也百官公卿表注六百石四百石至二百石以上皆銅印鼻鈕文曰印師古曰謂鈕但作鼻不為蟲獸之形而刻文云某官之印百官公卿表注右前漢書凡四條先農神農炎帝也祠以太牢百官皆從皇帝親執耒耜而耕天子三推三公五孤卿十大夫十二庶人終畝乃致藉田倉置令丞以給祭天地宗廟以為粢盛明帝紀永平四年注三又禮儀志正月始耕一條下注亦引此條有大賜輔二百里孝弟力田三老帛種百穀萬斛句伏日萬鬼行故盡日閉不干它事和帝紀永元六年注皇帝惟八月酎車駕夕牲牛以絳衣之皇帝暮視牲以鑑燧取水於月以火燧取火於日為明水火左袒以水沃牛右肩手執鸞刀以切牛尾薦之而即更衣巾待牛􅍄乃祀之禮儀志注求雨太常禱天地宗廟社稷山川以賽各如其常牢禮也四月立夏旱乃求雨禱雨而已後旱復重禱而已訖立秋雖旱不得禱求雨也禮儀志注顓頊氏有三子生而亡去為疫鬼一居江水是為虎一居若水是為魍魎蜮鬼一居人宫室區隅甌臾善驚人小兒甌臾未詳方相帥百𨽻及童女以桃弧棘矢土鼓鼓且射之以赤丸五榖播灑之禮儀志注祭天祡壇幄帷髙皇帝配天居堂下西向紺帷帳紺席祭祀志注祭天養牛五嵗至三千斤祭祀志注有按三千斤疑誤宗廟三年大祫祭於髙廟諸廟神皆合食設左右座髙祖南面幄繡帳望堂上西北隅帳中座長一丈廣六尺繡茵厚一尺著之以絮四百斤曲几黃金扣器髙后右座亦幄帳却六寸白銀扣器每牢中分之左辨上帝右辨上后爼餘委肉積於前數千斤名曰帷俎子為昭孫為穆昭西面曲屏風穆東面皆曲几如髙祖饌陳其右各配其左坐如祖妣之法太常導皇帝入北門羣臣陪者皆舉手班辟抑首伏大鴻臚大行令九儐傳曰起復位皇帝上堂盥侍中以巾奉觶酒從帝進拜謁贊饗曰嗣曽孫皇帝敬再拜前上酒却行至昭穆之坐次上酒子為昭孫為穆各父子相對也畢却西面坐坐如乘輿坐按二句疑有脫誤贊享奉髙祖賜夀皇帝起再拜即席以太牢之左辨賜皇帝如祠其夜半入行禮平明上九巵畢羣臣皆拜因賜胙皇帝出即更衣中詔罷當從者奉承祭祀志注凡齋紺幘耕青幘秋貙劉服緗幘輿服志注右後漢書凡九條臘者報諸鬼神古聖賢有功於民者也漢法三嵗一祭於雲陽宫甘泉壇以冬至日祭天天神下三嵗一祭地於河東汾隂后土宫以夏至日祭地地神出祭五帝於雍畤祭天用六綵綺席六重上一丈中一幅四周緣之玉几玉飾器桓帝祭天居玄雲宫齋百日上甘泉通天臺髙三十丈以候天神之下見如流火舞女童三百人皆年八嵗天神下壇所舉烽火桓帝就行宫中不至壇所甘泉臺去長安三百里望見長安成帝以來所祭天之圜丘也祭地河東汾隂后土宫宫曲入河古之祭地澤中方丘也禮儀如祭天武帝初置博士取學通行修博識多藝曉古文爾雅能屬文章為髙第朝賀位次中都官史稱先生不得言君其真弟子稱門人孝文皇帝時博士七十餘人朝服玄端章甫冠太僕帥諸苑三十六所分布北邊以郎為苑監官奴婢三萬人分養馬三十萬頭擇取給六廄牛羊無數以給犧牲按漢書如淳注引此條作漢官儀注將作大匠改作少府景帝中六年更名髙皇帝家在豐中陽里為沛泗上亭長及為天子立沛廟祠豐故宅右藝文類聚凡九條議郎中郎秦官也議郎秩比六百石特徴賢良方正敦朴有道第公府掾試博士者拜中郎也議郎十二人不屬署不直事侍御史遷補博士諸侯王郎中令中書掌詔誥答表皆機密之事髙后選孝悌為郎武帝元年令郡國舉孝廉各一人詣御史右北堂書鈔凡五條正月五日大置酒饗衛士右錢文子補漢兵志一條漢官舊儀補遺
